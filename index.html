<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifqyIPTV - Premium Stream</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .vjs-theme-city { --vjs-theme-city--primary: #3b82f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .channel-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="text-slate-200">

    <nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-blue-600 rounded-lg">
                    <i data-lucide="tv" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">Rifqy<span class="text-blue-500">IPTV</span></h1>
            </div>
            
            <div class="relative w-full md:w-96">
                <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-5 h-5"></i>
                <input type="text" id="searchInput" placeholder="Cari channel favorit..." 
                       class="w-full bg-slate-800 border border-slate-700 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-8">
        
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <div class="aspect-video bg-black rounded-2xl overflow-hidden border border-slate-800 shadow-2xl">
                    <video id="mainPlayer" class="video-js vjs-big-play-centered vjs-16-9 w-full h-full" controls preload="auto" data-setup='{}'>
                        <p class="vjs-no-js text-white">Aktifkan JavaScript untuk menonton.</p>
                    </video>
                </div>
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="currentChannelName" class="text-2xl font-bold text-white uppercase tracking-wide">Pilih Channel</h2>
                        <p id="currentGroup" class="text-slate-400 text-sm">Siaran Langsung</p>
                    </div>
                    <button onclick="location.reload()" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-full transition-colors">
                        <i data-lucide="refresh-cw" class="w-5 h-5 text-blue-400"></i>
                    </button>
                </div>
            </div>

            <div class="bg-slate-900/50 rounded-2xl border border-slate-800 p-4 h-[500px] lg:h-auto flex flex-col">
                <h3 class="font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="layout-grid" class="w-5 h-5 text-blue-500"></i> Kategori
                </h3>
                <div id="categoryList" class="space-y-2 overflow-y-auto pr-2">
                    </div>
            </div>
        </section>

        <section>
            <div class="flex items-center gap-2 mb-6">
                <i data-lucide="layers" class="text-blue-500 w-6 h-6"></i>
                <h3 class="text-xl font-bold text-white">Semua Channel</h3>
            </div>
            <div id="channelGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <div class="col-span-full text-center py-20 text-slate-500">
                    Memuat playlist...
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center py-10 text-slate-500 text-sm border-t border-slate-900">
        &copy; 2026 RifqyIPTV Project. Dibuat dengan semangat.
    </footer>

    <script>
        // Inisialisasi Lucide
        lucide.createIcons();

        const player = videojs('mainPlayer');
        let allChannels = [];

        // Fungsi Parser M3U
        async function loadPlaylist() {
            try {
                const response = await fetch('playlist.m3u'); // Membaca file lokal di repo
                const data = await response.text();
                parseM3U(data);
            } catch (error) {
                console.error("Gagal memuat playlist:", error);
                document.getElementById('channelGrid').innerHTML = '<div class="col-span-full text-red-400">Gagal memuat playlist.m3u</div>';
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            let channels = [];
            let currentChannel = null;

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const info = line;
                    const name = info.split(',').pop();
                    const logoMatch = info.match(/tvg-logo="([^"]+)"/);
                    const groupMatch = info.match(/group-title="([^"]+)"/);
                    
                    currentChannel = {
                        name: name,
                        logo: logoMatch ? logoMatch[1] : 'https://via.placeholder.com/150/1e293b/ffffff?text=TV',
                        group: groupMatch ? groupMatch[1] : 'Lainnya',
                        url: ''
                    };
                } else if (line.startsWith('http')) {
                    if (currentChannel) {
                        currentChannel.url = line;
                        channels.push(currentChannel);
                        currentChannel = null;
                    }
                }
            });

            allChannels = channels;
            renderChannels(channels);
            renderCategories(channels);
        }

        function renderChannels(channels) {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = channels.map(channel => `
                <div onclick="playChannel('${channel.url}', '${channel.name}', '${channel.group}')" 
                     class="channel-card group bg-slate-800/40 border border-slate-700 p-3 rounded-xl cursor-pointer hover:bg-slate-700 transition-all hover:border-blue-500 shadow-lg">
                    <div class="aspect-video bg-slate-900 rounded-lg overflow-hidden mb-3 relative">
                        <img src="${channel.logo}" alt="${channel.name}" class="w-full h-full object-contain transition-transform duration-300">
                        <div class="absolute inset-0 bg-blue-600/0 group-hover:bg-blue-600/20 transition-colors flex items-center justify-center">
                            <i data-lucide="play-circle" class="w-8 h-8 text-white opacity-0 group-hover:opacity-100 transform scale-50 group-hover:scale-100 transition-all"></i>
                        </div>
                    </div>
                    <p class="text-xs font-semibold text-center truncate text-slate-300 group-hover:text-white">${channel.name}</p>
                    <p class="text-[10px] text-center text-slate-500 mt-1 uppercase">${channel.group}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderCategories(channels) {
            const categories = ['Semua', ...new Set(channels.map(c => c.group))];
            const list = document.getElementById('categoryList');
            list.innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" 
                        class="w-full text-left px-4 py-2 rounded-lg text-sm hover:bg-blue-600 hover:text-white transition-all border border-transparent hover:border-blue-400">
                    ${cat}
                </button>
            `).join('');
        }

        function filterCategory(category) {
            if (category === 'Semua') {
                renderChannels(allChannels);
            } else {
                const filtered = allChannels.filter(c => c.group === category);
                renderChannels(filtered);
            }
        }

        function playChannel(url, name, group) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
            document.getElementById('currentChannelName').innerText = name;
            document.getElementById('currentGroup').innerText = group;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Fitur Pencarian
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
            renderChannels(filtered);
        });

        loadPlaylist();
    </script>
</body>
</html>
